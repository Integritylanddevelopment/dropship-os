name: shipstack

x-base: &base
  image: shipstack-base:latest
  build:
    context: .
    dockerfile: docker/Dockerfile.base
  restart: unless-stopped
  working_dir: /app
  env_file: .env
  volumes:
    - C:/shipstack:/app
  extra_hosts:
    - "host.docker.internal:host-gateway"
  environment:
    PYTHONUNBUFFERED: "1"
    SHIPSTACK_DIR: /app
    LOG_DIR: /app/logs
    FFMPEG_PATH: /usr/bin/ffmpeg
    QDRANT_HOST: 100.124.162.86
    QDRANT_PORT: "6333"
    OLLAMA_HOST: host.docker.internal
    OLLAMA_PORT: "11434"
    QUINN_HOST: host.docker.internal
    QUINN_ENDPOINT: http://host.docker.internal:8765
  networks:
    - shipstack-net

services:
  shipstack-engine:
    <<: *base
    container_name: shipstack-engine
    command: python engines/shipstack_engine.py
    ports:
      - "8889:8889"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8889/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  prometheus-engine:
    <<: *base
    container_name: prometheus-engine
    command: python engines/prometheus_engine.py
    ports:
      - "8766:8766"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8766/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      shipstack-engine:
        condition: service_healthy

  social-ai-agent:
    <<: *base
    container_name: social-ai-agent
    command: python agents/social_ai_agent.py
    ports:
      - "8867:8867"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8867/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      shipstack-engine:
        condition: service_healthy

  shipstack-dashboard:
    <<: *base
    container_name: shipstack-dashboard
    command: python engines/shipstack_dashboard.py
    ports:
      - "8890:8890"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8890/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      prometheus-engine:
        condition: service_healthy
      social-ai-agent:
        condition: service_healthy

  pipeline-dashboard:
    <<: *base
    container_name: pipeline-dashboard
    command: python dashboard/pipeline_dashboard.py
    ports:
      - "8891:8891"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8891/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      shipstack-engine:
        condition: service_healthy

  decision-engine:
    <<: *base
    container_name: decision-engine
    command: python docker/run_decision_engine_loop.py
    depends_on:
      shipstack-engine:
        condition: service_healthy

  content-pipeline:
    <<: *base
    container_name: content-pipeline
    command: python docker/run_content_pipeline_loop.py
    depends_on:
      shipstack-engine:
        condition: service_healthy

networks:
  shipstack-net:
    name: shipstack-net
