<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShipStack - Product Discovery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #999;
            font-size: 1.1em;
        }

        .search-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            color: #fff;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        input[type="text"]::placeholder {
            color: #666;
        }

        button {
            padding: 14px 28px;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .search-info {
            font-size: 0.9em;
            color: #999;
            margin-top: 15px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.5);
            border-radius: 20px;
            font-size: 0.85em;
            margin-top: 10px;
        }

        .status-badge.live {
            background: rgba(76, 175, 80, 0.2);
            border-color: rgba(76, 175, 80, 0.5);
            color: #4caf50;
        }

        .status-badge.cached {
            background: rgba(255, 152, 0, 0.2);
            border-color: rgba(255, 152, 0, 0.5);
            color: #ff9800;
        }

        .results-section {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .product-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(0, 212, 255, 0.5);
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 212, 255, 0.15);
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .product-card:hover::before {
            left: 100%;
        }

        .product-name {
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 12px;
            color: #00d4ff;
        }

        .product-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .meta-item {
            background: rgba(0, 212, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid #00d4ff;
        }

        .meta-label {
            font-size: 0.8em;
            color: #999;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .meta-value {
            font-size: 1.1em;
            font-weight: 600;
            color: #fff;
        }

        .meta-value.margin {
            color: #4caf50;
        }

        .meta-value.score {
            color: #ff9800;
        }

        .trending-bar {
            width: 100%;
            height: 6px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }

        .trending-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff9800, #ffc107);
            border-radius: 3px;
        }

        .sources {
            font-size: 0.9em;
            color: #999;
            margin-bottom: 12px;
        }

        .sources-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
        }

        .source-tag {
            background: rgba(0, 212, 255, 0.1);
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 0.85em;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .add-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            transition: all 0.3s ease;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.3);
        }

        .add-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 212, 255, 0.2);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state h2 {
            color: #999;
            margin-bottom: 10px;
        }

        .error {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.3);
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
            color: #ff5252;
        }

        .success {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
            color: #4caf50;
        }

        .recommendation {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: 600;
            margin-top: 8px;
        }

        .recommendation.pursue {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.5);
        }

        .recommendation.investigate {
            background: rgba(255, 152, 0, 0.2);
            color: #ff9800;
            border: 1px solid rgba(255, 152, 0, 0.5);
        }

        .recommendation.skip {
            background: rgba(244, 67, 54, 0.2);
            color: #ff5252;
            border: 1px solid rgba(244, 67, 54, 0.5);
        }

        .cache-info {
            font-size: 0.75em;
            color: #666;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Product Discovery Engine</h1>
            <p class="subtitle">Find hot viral products. Decision Engine scores them. Add to pipeline.</p>
        </header>

        <div class="search-section">
            <div class="search-box">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search: 'beauty trending tiktok' or 'gym trending youtube' or 'tech viral products'"
                    autocomplete="off"
                >
                <button id="searchBtn" onclick="searchProducts()">Search Internet</button>
            </div>

            <div class="search-info">
                [PHASE 1] Real-time discovery  |  [PHASE 2] Deep dive (triggered by Decision Engine approval)
                <div class="status-badge cached" id="cacheStatus">Using hybrid caching (6h refresh)</div>
            </div>
        </div>

        <div id="resultsContainer" class="results-section"></div>
    </div>

    <script>
        const API_BASE = '/api';

        async function searchProducts() {
            const query = document.getElementById('searchInput').value.trim();
            const container = document.getElementById('resultsContainer');
            const btn = document.getElementById('searchBtn');

            if (!query) {
                container.innerHTML = '<div class="empty-state"><h2>Enter a search query</h2><p>e.g., "beauty trending tiktok" or "gym products viral"</p></div>';
                return;
            }

            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Phase 1: Searching internet for trending products...</p><p style="font-size: 0.9em; margin-top: 10px;">Querying Amazon, eBay, AliExpress, Google Trends, YouTube, Reddit...</p></div>';
            btn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/discover?q=${encodeURIComponent(query)}`);
                
                if (!response.ok) {
                    throw new Error(`API error: ${response.status} ${response.statusText}`);
                }

                const data = await response.json();
                
                if (data.status !== 'success' || !data.products) {
                    container.innerHTML = `<div class="error">Error: ${data.error || 'No products found'}</div>`;
                    btn.disabled = false;
                    return;
                }

                displayResults(data.products, query, data.cache_source, data.elapsed_seconds);
            } catch (error) {
                console.error('Search error:', error);
                container.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            } finally {
                btn.disabled = false;
            }
        }

        function displayResults(products, query, cacheSource, elapsedSeconds) {
            const container = document.getElementById('resultsContainer');

            if (!products || products.length === 0) {
                container.innerHTML = '<div class="empty-state"><h2>No products found</h2><p>Try a different search term</p></div>';
                return;
            }

            container.innerHTML = products.map((product, idx) => {
                const recommendation = product.decision_engine_score?.recommendation || 'INVESTIGATE';
                const score = product.decision_engine_score?.overall_score || 0;
                const reasoning = product.decision_engine_score?.reasoning || '';
                
                return `
                    <div class="product-card">
                        <div class="product-name">${product.product_name}</div>

                        <div class="product-meta">
                            <div class="meta-item">
                                <div class="meta-label">Decision Score</div>
                                <div class="meta-value score">${score}/100</div>
                                <div class="trending-bar">
                                    <div class="trending-fill" style="width: ${score}%"></div>
                                </div>
                            </div>
                            <div class="meta-item">
                                <div class="meta-label">Margin Range</div>
                                <div class="meta-value margin">${product.pricing.margin_low_percent}%-${product.pricing.margin_high_percent}%</div>
                            </div>
                        </div>

                        <div class="product-meta">
                            <div class="meta-item">
                                <div class="meta-label">Supplier</div>
                                <div class="meta-value">${product.supply_data.supplier}</div>
                            </div>
                            <div class="meta-item">
                                <div class="meta-label">Amazon Rank</div>
                                <div class="meta-value">#${product.sales_data.amazon_rank || 'N/A'}</div>
                            </div>
                        </div>

                        <div class="sources">
                            <strong>Demand Signals:</strong>
                            <div class="sources-list">
                                ${product.demand_signals?.google_trends_score ? `<span class="source-tag">Google Trends: ${product.demand_signals.google_trends_score}/100</span>` : ''}
                                ${product.demand_signals?.youtube_review_count ? `<span class="source-tag">YouTube: ${product.demand_signals.youtube_review_count} reviews</span>` : ''}
                                ${product.demand_signals?.reddit_mentions_30d ? `<span class="source-tag">Reddit: ${product.demand_signals.reddit_mentions_30d} mentions</span>` : ''}
                            </div>
                        </div>

                        <div class="sources" style="margin-bottom: 8px;">
                            <strong>Market Status:</strong> ${product.market_saturation?.saturation_level || 'medium'} saturation (${product.market_saturation?.competitor_count_estimate || '?'} competitors)
                        </div>

                        <div class="recommendation ${recommendation.toLowerCase()}">
                            ${recommendation}
                        </div>

                        <div class="cache-info">${reasoning}</div>

                        <button class="add-btn" onclick="addToPipeline('${product.product_name}', '${product.product_name.replace(/'/g, "\\'")}', ${score})">
                            ${score >= 70 ? 'Add to Pipeline [Approved]' : score >= 50 ? 'Investigate Further' : 'Skip'}
                        </button>
                    </div>
                `;
            }).join('');

            // Update cache status
            const cacheEl = document.getElementById('cacheStatus');
            if (cacheSource === 'cache') {
                cacheEl.textContent = `[CACHED] Results from 6h cache (${elapsedSeconds}s)`;
                cacheEl.className = 'status-badge cached';
            } else {
                cacheEl.textContent = `[LIVE] Fresh query (${elapsedSeconds}s)`;
                cacheEl.className = 'status-badge live';
            }
        }

        async function addToPipeline(productName, productNameEscaped, score) {
            if (score < 50) {
                alert('Decision Engine recommends SKIP for this product.');
                return;
            }

            // This will trigger Phase 2: POST /api/discover/deepdive
            console.log(`Adding to pipeline: ${productName} (score: ${score})`);
            alert(`[Phase 2] Triggering deep dive for "${productName}"...\\n\\nStarting corpus scrape:\\n- TikTok (50 videos)\\n- Shopify competitors (3-5 stores)\\n- YouTube reviews\\n- Reddit discussions\\n\\nPlease wait 5-10 minutes.`);
            
            // In Phase 2+, this would call:
            // POST /api/discover/deepdive?product_id=<id>
            // and show corpus preview
        }

        // Allow Enter key to search
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchProducts();
        });
    </script>
</body>
</html>
